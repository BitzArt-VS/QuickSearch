name: Release UI-Tweaks

on:
  repository_dispatch:
  push:
    tags:
    - "UI-Tweaks-v[0-9]+.[0-9]+.[0-9]+*"

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:

  release:
    name: Release UI-Tweaks
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Verify commit
        run: |
          git branch --remote --contains | grep origin/main

      - name: Set version
        run: echo "VERSION=${GITHUB_REF/refs\/tags\/UI-Tweaks-v/}" >> $GITHUB_ENV

      - name: Set version in modinfo.json
        run: |
          jq --arg v "$VERSION" '.version = $v' resources/modinfo/bitzartuitweaks/modinfo.json > tmp.json && mv tmp.json resources/modinfo/bitzartuitweaks/modinfo.json

      - name: Build
        run: dotnet build UI-Tweaks.sln --configuration Release -p:Version="$VERSION"

      - name: Test
        run: dotnet test --no-restore --verbosity normal

      - name: Publish
        run: |
          dotnet publish ./src/UI-Tweaks/UI-Tweaks.csproj -o ./release/${VERSION}/src
          mv ./release/${VERSION}/UI-Tweaks.zip ./release/${VERSION}/UI-Tweaks_v${VERSION}.zip

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep "^UI-Tweaks-v" | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: 📺 UI-Tweaks v${{ env.VERSION }}
          body: ${{ steps.changelog.outputs.changelog }}
          make_latest: true
          files: |
            release/${{ env.VERSION }}/UI-Tweaks_v${{ env.VERSION }}.zip